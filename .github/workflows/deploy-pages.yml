name: Déploiement GitHub Pages

# Publie index.html + data.json sur GitHub Pages à chaque mise à jour sur main.
# Prérequis : Settings → Pages → Source = « GitHub Actions ».

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "data.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Permissions minimales requises par le déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on annule celui en cours si un nouveau arrive
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Préparation du site (index.html + data.json)
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp data.json _site/data.json

      - name: Configuration de GitHub Pages
        uses: actions/configure-pages@v5

      - name: Téléversement de l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
