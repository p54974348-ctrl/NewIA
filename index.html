<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Veille IA francophone</title>
<style>
  :root {
    --bg:#fbfcfd; --surface:#ffffff; --surface-2:#f4f6f9; --ink:#16202b;
    --muted:#5a6875; --faint:#8996a3; --border:#e4e9ef; --accent:#2d6be0;
    --accent-ink:#1b4fb0; --accent-bg:#eaf1fd; --warn-bg:#fff4e0; --warn-ink:#8a5a00;
    --shadow:0 1px 2px rgba(20,32,43,.04), 0 10px 30px -20px rgba(20,32,43,.35);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0e141b; --surface:#151e28; --surface-2:#1b2632; --ink:#e7edf3;
      --muted:#97a3b1; --faint:#6c7885; --border:#26313f; --accent:#5b93f5;
      --accent-ink:#a9c8fb; --accent-bg:#17263c; --warn-bg:#2a2210; --warn-ink:#e6c583;
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 12px 34px -22px rgba(0,0,0,.85);
    }
  }
  * { box-sizing:border-box; }
  html { -webkit-text-size-adjust:100%; }
  body {
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased;
  }

  main { max-width:1000px; margin:0 auto; padding:clamp(1.5rem,4vw,3.5rem) clamp(1.1rem,4vw,2rem) 4rem; }
  .eyebrow { font-size:.72rem; letter-spacing:.16em; text-transform:uppercase; font-weight:600; color:var(--accent); margin:0 0 .6rem; }
  h1.title { font-size:clamp(1.6rem,4vw,2.2rem); line-height:1.15; letter-spacing:-.02em; margin:0 0 .5rem; text-wrap:balance; }
  .intro { color:var(--muted); font-size:1.02rem; margin:0 0 1.6rem; max-width:60ch; }

  /* ---- Onglets (un par jour, du plus récent au plus ancien) ---- */
  .tabs {
    display:flex; gap:.4rem; overflow-x:auto; padding-bottom:.5rem;
    border-bottom:1px solid var(--border); margin-bottom:1.6rem;
    scrollbar-width:thin;
  }
  .tab {
    flex:0 0 auto; cursor:pointer; border:1px solid var(--border);
    background:var(--surface); color:var(--muted);
    padding:.5rem .9rem; border-radius:999px; font-size:.85rem; font-weight:600;
    white-space:nowrap; font-variant-numeric:tabular-nums;
    transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  .tab:hover { border-color:var(--accent); color:var(--ink); }
  .tab[aria-selected="true"] {
    background:var(--accent); color:#fff; border-color:var(--accent);
  }
  .tab .badge { font-weight:500; opacity:.75; margin-left:.35rem; }

  .panel { display:none; }
  .panel.active { display:block; animation:fade .2s ease; }
  @keyframes fade { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
  @media (prefers-reduced-motion:reduce) { .panel.active { animation:none; } }

  .panel-date { font-size:.9rem; color:var(--faint); margin:0 0 1.2rem; }
  h2.section { font-size:1.15rem; margin:1.8rem 0 .7rem; letter-spacing:-.01em; }
  .table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow); }
  table { width:100%; border-collapse:collapse; min-width:640px; font-size:.9rem; }
  thead th {
    text-align:left; background:var(--surface-2); color:var(--muted);
    font-weight:600; font-size:.75rem; letter-spacing:.05em; text-transform:uppercase;
    padding:.7rem .9rem; border-bottom:1px solid var(--border); white-space:nowrap;
  }
  tbody td { padding:.8rem .9rem; border-bottom:1px solid var(--border); vertical-align:top; }
  tbody tr:last-child td { border-bottom:none; }
  tbody tr:hover { background:var(--surface-2); }
  td.titre { font-weight:600; color:var(--ink); min-width:180px; }
  td.source { color:var(--muted); white-space:nowrap; }
  td a { color:var(--accent); text-decoration:none; font-weight:500; }
  td a:hover { text-decoration:underline; }
  td.resume { color:var(--muted); max-width:340px; }
  .empty { color:var(--faint); font-style:italic; padding:.4rem 0; }
  .loading, .error { color:var(--muted); padding:2rem 0; }
  .error { color:#d64545; }
  footer { margin-top:3rem; padding-top:1.3rem; border-top:1px solid var(--border); font-size:.78rem; color:var(--faint); }
  .tab:focus-visible, .tab:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
</style>
</head>
<body>

  <main>
    <p class="eyebrow">Veille quotidienne · Intelligence artificielle</p>
    <h1 class="title">Veille IA francophone</h1>
    <p class="intro">Historique des veilles, un onglet par jour (du plus récent au plus ancien). L'onglet le plus récent est affiché par défaut.</p>

    <div id="tabs" class="tabs" role="tablist" aria-label="Journées de veille"></div>
    <div id="panels">
      <p class="loading">Chargement de l'historique…</p>
    </div>

    <footer>
      Veille IA francophone · historique conservé dans <code>data.json</code>.
    </footer>
  </main>

<script>
  var esc = function (s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  };

  function tableHTML(items, action) {
    if (!items || !items.length) {
      return '<p class="empty">Aucune nouveauté récente sur ce volet ce jour-là.</p>';
    }
    var rows = items.map(function (it) {
      var lien = it.lien
        ? '<a href="' + esc(it.lien) + '" target="_blank" rel="noopener">' + (action || 'Ouvrir') + '</a>'
        : '<span class="empty">—</span>';
      return '<tr>' +
        '<td class="titre">' + esc(it.titre) + '</td>' +
        '<td class="source">' + esc(it.source) + '</td>' +
        '<td>' + lien + '</td>' +
        '<td class="resume">' + esc(it.resume) + '</td>' +
      '</tr>';
    }).join('');
    return '<div class="table-wrap"><table><thead><tr>' +
      '<th>Titre</th><th>Source</th><th>Lien vers l\'item</th><th>Résumé</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  function render(data) {
    var days = (data && data.days) ? data.days.slice() : [];
    // Tri décroissant : la date la plus récente en premier
    days.sort(function (a, b) { return (b.date || '').localeCompare(a.date || ''); });

    var tabs = document.getElementById('tabs');
    var panels = document.getElementById('panels');
    tabs.innerHTML = '';
    panels.innerHTML = '';

    if (!days.length) {
      panels.innerHTML = '<p class="error">Aucune donnée de veille disponible.</p>';
      return;
    }

    days.forEach(function (day, i) {
      var id = 'jour-' + (day.date || i);
      var count = (day.articles ? day.articles.length : 0) + (day.podcasts ? day.podcasts.length : 0);

      var tab = document.createElement('button');
      tab.className = 'tab';
      tab.setAttribute('role', 'tab');
      tab.id = 'tab-' + id;
      tab.setAttribute('aria-controls', 'panel-' + id);
      tab.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
      tab.tabIndex = i === 0 ? 0 : -1;
      tab.innerHTML = esc(day.label || day.date) + '<span class="badge">' + count + '</span>';
      tabs.appendChild(tab);

      var panel = document.createElement('section');
      panel.className = 'panel' + (i === 0 ? ' active' : '');
      panel.id = 'panel-' + id;
      panel.setAttribute('role', 'tabpanel');
      panel.setAttribute('aria-labelledby', 'tab-' + id);
      panel.innerHTML =
        '<p class="panel-date">Veille du ' + esc(day.label || day.date) + '</p>' +
        '<h2 class="section">Articles</h2>' + tableHTML(day.articles, 'Ouvrir') +
        '<h2 class="section">Podcasts (Audible)</h2>' + tableHTML(day.podcasts, 'Écouter');
      panels.appendChild(panel);

      tab.addEventListener('click', function () { select(id); });
    });

    // Navigation clavier entre onglets
    tabs.addEventListener('keydown', function (e) {
      if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
      var list = Array.prototype.slice.call(tabs.querySelectorAll('.tab'));
      var cur = list.indexOf(document.activeElement);
      if (cur === -1) return;
      var next = e.key === 'ArrowRight' ? (cur + 1) % list.length : (cur - 1 + list.length) % list.length;
      list[next].focus();
      list[next].click();
      e.preventDefault();
    });
  }

  function select(id) {
    var tabs = document.querySelectorAll('.tab');
    var panels = document.querySelectorAll('.panel');
    tabs.forEach(function (t) {
      var on = t.id === 'tab-' + id;
      t.setAttribute('aria-selected', on ? 'true' : 'false');
      t.tabIndex = on ? 0 : -1;
    });
    panels.forEach(function (p) {
      p.classList.toggle('active', p.id === 'panel-' + id);
    });
  }

  // Chargement des données (cache-buster pour éviter un data.json obsolète en cache)
  fetch('data.json?_=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(function (err) {
      document.getElementById('panels').innerHTML =
        '<p class="error">Impossible de charger l\'historique (' + esc(err.message) + ').</p>';
    });
</script>
</body>
</html>
