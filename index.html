<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#fbfcfd" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0e141b" media="(prefers-color-scheme: dark)">
<title>Veille IA francophone</title>
<style>
  :root {
    --bg:#fbfcfd; --surface:#ffffff; --surface-2:#f4f6f9; --ink:#16202b;
    --muted:#5a6875; --faint:#8996a3; --border:#e4e9ef; --accent:#2d6be0;
    --accent-ink:#1b4fb0; --accent-bg:#eaf1fd;
    --podcast:#8a4bd6; --podcast-ink:#6a2fb5; --podcast-bg:#f1e9fb;
    --en:#0a8a6a; --en-ink:#0a6a52; --en-bg:#e2f5ef;
    --shadow:0 1px 2px rgba(20,32,43,.04), 0 10px 30px -20px rgba(20,32,43,.35);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0e141b; --surface:#151e28; --surface-2:#1b2632; --ink:#e7edf3;
      --muted:#97a3b1; --faint:#6c7885; --border:#26313f; --accent:#5b93f5;
      --accent-ink:#a9c8fb; --accent-bg:#17263c;
      --podcast:#b28cf0; --podcast-ink:#cbb0f7; --podcast-bg:#231a33;
      --en:#4fc9a6; --en-ink:#8fe0c9; --en-bg:#12291f;
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 12px 34px -20px rgba(0,0,0,.85);
    }
  }
  @media (prefers-contrast: more) { :root { --border:#9aa6b2; --muted:#3a4652; } }

  * { box-sizing:border-box; }
  html { -webkit-text-size-adjust:100%; }
  body {
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }

  main { max-width:820px; margin:0 auto; padding:clamp(1.25rem,4vw,3.5rem) clamp(1rem,4vw,2rem) 4rem; }
  .eyebrow { font-size:.72rem; letter-spacing:.16em; text-transform:uppercase; font-weight:600; color:var(--accent); margin:0 0 .6rem; }
  h1.title { font-size:clamp(1.5rem,4vw,2.2rem); line-height:1.15; letter-spacing:-.02em; margin:0 0 .5rem; text-wrap:balance; }

  /* ---- Barre onglets + filtres, collante ---- */
  .nav {
    position:sticky; top:0; z-index:10;
    background:color-mix(in srgb, var(--bg) 88%, transparent);
    -webkit-backdrop-filter:saturate(1.4) blur(8px); backdrop-filter:saturate(1.4) blur(8px);
    margin:0 calc(-1 * clamp(1rem,4vw,2rem)); padding:.6rem clamp(1rem,4vw,2rem) 0;
    border-bottom:1px solid var(--border);
  }
  @supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))) { .nav { background:var(--bg); } }

  .tabs { display:flex; gap:.4rem; overflow-x:auto; padding-bottom:.6rem; scrollbar-width:thin; -webkit-overflow-scrolling:touch; }
  .tab {
    flex:0 0 auto; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--muted);
    padding:.5rem .9rem; border-radius:999px; font-size:.85rem; font-weight:600; white-space:nowrap;
    font-variant-numeric:tabular-nums; transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  .tab:hover { border-color:var(--accent); color:var(--ink); }
  .tab[aria-selected="true"] { background:var(--accent); color:#fff; border-color:var(--accent); }
  .tab .badge { font-weight:500; opacity:.75; margin-left:.35rem; }

  .filters { display:flex; flex-wrap:wrap; gap:.4rem 1.4rem; padding:.6rem 0 .75rem; }
  .filter { display:flex; align-items:center; gap:.5rem; }
  .filter-label { font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); font-weight:600; }
  .segmented { display:inline-flex; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:3px; gap:2px; }
  .seg { cursor:pointer; border:none; background:transparent; color:var(--muted); padding:.4rem .8rem; border-radius:8px; font-size:.85rem; font-weight:600; transition:background .15s ease, color .15s ease; }
  .seg:hover { color:var(--ink); }
  .seg[aria-pressed="true"] { background:var(--surface); color:var(--accent); box-shadow:var(--shadow); }
  @media (pointer: coarse) { .seg { padding:.6rem 1rem; min-height:44px; display:inline-flex; align-items:center; } .tab { padding:.6rem 1rem; } }

  #panels { margin-top:1.6rem; }
  .panel { display:none; }
  .panel.active { display:block; animation:fade .2s ease; }
  @keyframes fade { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
  @media (prefers-reduced-motion:reduce) { .panel.active { animation:none; } .tab,.seg,.post,.post-title,.go { transition:none; } }

  /* Filtre type (contenu) */
  #panels[data-filter="articles"] .sec-podcasts { display:none; }
  #panels[data-filter="podcasts"] .sec-articles { display:none; }
  /* Filtre langue (défaut : français uniquement) */
  #panels[data-lang="fr"] .post[data-lang="en"] { display:none; }
  #panels[data-lang="en"] .post[data-lang="fr"] { display:none; }

  .panel-date { font-size:.9rem; color:var(--faint); margin:0 0 1.4rem; }

  .sec { margin-top:2rem; }
  .sec.sec-articles { margin-top:0; }
  .sec-head { display:flex; align-items:baseline; gap:.6rem; padding-bottom:.5rem; border-bottom:2px solid var(--ink); margin-bottom:.3rem; }
  .sec-articles .sec-head { border-color:var(--accent); }
  .sec-podcasts .sec-head { border-color:var(--podcast); }
  .sec-head h2 { font-size:1.05rem; margin:0; text-transform:uppercase; letter-spacing:.04em; }
  .sec-head .count { font-size:.82rem; color:var(--faint); font-variant-numeric:tabular-nums; }

  .posts { display:flex; flex-direction:column; }
  .post {
    display:flex; gap:.95rem; padding:1.15rem .35rem; border-bottom:1px solid var(--border);
    cursor:pointer; transition:background .15s ease;
  }
  .post:hover { background:var(--accent-bg); }
  .sec-podcasts .post:hover { background:var(--podcast-bg); }
  .post-thumb {
    flex:0 0 auto; position:relative; width:72px; height:72px; margin-top:.15rem;
    border-radius:10px; overflow:hidden; border:1px solid var(--border);
    background:linear-gradient(135deg, hsl(var(--h,220) 62% 58%), hsl(calc(var(--h,220) + 28) 58% 45%));
    display:flex; align-items:center; justify-content:center;
  }
  .post-thumb-mono { color:#fff; font-weight:800; font-size:1.6rem; text-transform:uppercase; text-shadow:0 1px 2px rgba(0,0,0,.25); }
  .post-thumb-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; background:var(--surface-2); }
  .post-rankbadge {
    position:absolute; top:0; left:0; z-index:2; background:rgba(12,18,26,.62); color:#fff;
    font-size:.66rem; font-weight:700; padding:.06rem .34rem; border-bottom-right-radius:8px; font-variant-numeric:tabular-nums;
  }
  @media (max-width:680px){ .post-thumb{ width:58px; height:58px } .post-thumb-mono{ font-size:1.3rem } }
  .post-body { min-width:0; }
  .post-title { font-size:1.12rem; line-height:1.35; margin:0 0 .45rem; font-weight:650; color:var(--ink); text-wrap:balance; transition:color .15s ease; }
  .post-title .go { color:var(--faint); font-weight:400; margin-left:.25rem; transition:color .15s ease; }
  .post:hover .post-title { color:var(--accent-ink); }
  .sec-podcasts .post:hover .post-title { color:var(--podcast-ink); }
  .post:hover .post-title .go { color:var(--accent); }
  .post-meta { margin:0 0 .5rem; display:flex; align-items:center; gap:.4rem; flex-wrap:wrap; }
  .tag { display:inline-block; font-size:.7rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--accent-ink); background:var(--accent-bg); padding:.2rem .55rem; border-radius:6px; }
  .sec-podcasts .tag { color:var(--podcast-ink); background:var(--podcast-bg); }
  .lang-badge { font-size:.64rem; font-weight:700; letter-spacing:.04em; padding:.15rem .4rem; border-radius:5px; border:1px solid var(--border); color:var(--faint); }
  .lang-badge.lb-en { color:var(--en-ink); background:var(--en-bg); border-color:transparent; }
  .post-excerpt { margin:0; color:var(--muted); font-size:.96rem; max-width:66ch; }
  .post:focus-visible { outline:2px solid var(--accent); outline-offset:-2px; border-radius:8px; }

  .empty { color:var(--faint); font-style:italic; padding:.9rem .35rem; }
  .loading, .error { color:var(--muted); padding:2rem 0; }
  .error { color:#d64545; }
  footer { margin-top:3rem; padding-top:1.3rem; border-top:1px solid var(--border); font-size:.78rem; color:var(--faint); }
  .tab:focus-visible, .seg:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
</style>
</head>
<body>

  <main>
    <p class="eyebrow">Veille quotidienne · Intelligence artificielle</p>
    <h1 class="title">Veille IA francophone</h1>

    <div class="nav">
      <div id="tabs" class="tabs" role="tablist" aria-label="Journées de veille"></div>
      <div class="filters">
        <div class="filter">
          <span class="filter-label">Type</span>
          <div class="segmented" role="group" aria-label="Filtrer par type de contenu">
            <button class="seg seg-type" data-filter="all" aria-pressed="true">Tout</button>
            <button class="seg seg-type" data-filter="articles" aria-pressed="false">Articles</button>
            <button class="seg seg-type" data-filter="podcasts" aria-pressed="false">Podcasts</button>
          </div>
        </div>
        <div class="filter">
          <span class="filter-label">Langue</span>
          <div class="segmented" role="group" aria-label="Filtrer par langue">
            <button class="seg seg-lang" data-lang="fr" aria-pressed="true">Français</button>
            <button class="seg seg-lang" data-lang="en" aria-pressed="false">Anglais</button>
            <button class="seg seg-lang" data-lang="all" aria-pressed="false">Toutes</button>
          </div>
        </div>
      </div>
    </div>

    <div id="panels">
      <p class="loading">Chargement de l'historique…</p>
    </div>

    <footer>
      Veille IA · <code>data.json</code> · 5 derniers jours · 10 items max par langue et par volet.
    </footer>
  </main>

<script>
  var MAX_ITEMS = 10; // 10 items max PAR LANGUE et par volet
  var MAX_DAYS = 5;

  var esc = function (s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  };
  function langOf(it) { return (it && it.lang === 'en') ? 'en' : 'fr'; } // défaut fr

  function hueOf(s) { s = String(s || ''); var h = 0; for (var k = 0; k < s.length; k++) h = (h * 31 + s.charCodeAt(k)) % 360; return h; }
  function monoOf(s) { var m = String(s || '?').match(/[A-Za-zÀ-ÿ0-9]/); return m ? m[0].toUpperCase() : '?'; }

  function thumbHTML(it, rank) {
    var img = it.image
      ? '<img class="post-thumb-img" src="' + esc(it.image) + '" alt="" loading="lazy" referrerpolicy="no-referrer">'
      : '';
    return '<div class="post-thumb" style="--h:' + hueOf(it.source || it.titre) + '">' +
      '<span class="post-thumb-mono" aria-hidden="true">' + esc(monoOf(it.source || it.titre)) + '</span>' +
      img + '<span class="post-rankbadge">' + rank + '</span></div>';
  }

  function postRow(it, rank, action) {
    var lang = langOf(it);
    var hasLink = !!it.lien;
    var go = hasLink ? ' <span class="go" aria-hidden="true">↗</span>' : '';
    var cls = 'post' + (hasLink ? ' row-link' : '');
    var linkAttrs = hasLink
      ? ' data-href="' + esc(it.lien) + '" tabindex="0" role="link" aria-label="' + esc((action || 'Ouvrir') + ' : ' + it.titre) + '"'
      : '';
    return '<article class="' + cls + '" data-lang="' + lang + '"' + linkAttrs + '>' +
      thumbHTML(it, rank) +
      '<div class="post-body">' +
        '<h3 class="post-title">' + esc(it.titre) + go + '</h3>' +
        '<p class="post-meta"><span class="tag">' + esc(it.source) + '</span>' +
          '<span class="lang-badge lb-' + lang + '">' + (lang === 'en' ? 'EN' : 'FR') + '</span></p>' +
        '<p class="post-excerpt">' + esc(it.resume) + '</p>' +
      '</div></article>';
  }

  // 10 max PAR LANGUE ; on rend d'abord le français, puis l'anglais
  function postsHTML(items, action) {
    items = items || [];
    var fr = items.filter(function (it) { return langOf(it) === 'fr'; }).slice(0, MAX_ITEMS);
    var en = items.filter(function (it) { return langOf(it) === 'en'; }).slice(0, MAX_ITEMS);
    var html = fr.map(function (it, i) { return postRow(it, i + 1, action); }).join('') +
               en.map(function (it, i) { return postRow(it, i + 1, action); }).join('');
    return '<div class="posts">' + html + '</div>';
  }

  function sectionHTML(cls, titre, items, action) {
    return '<section class="sec ' + cls + '">' +
      '<div class="sec-head"><h2>' + titre + '</h2><span class="count"></span></div>' +
      postsHTML(items, action) +
      '<p class="empty" hidden>Aucune nouveauté pour cette langue sur ce volet.</p>' +
    '</section>';
  }

  var panels;

  function render(data) {
    var days = (data && data.days) ? data.days.slice() : [];
    days.sort(function (a, b) { return (b.date || '').localeCompare(a.date || ''); });
    days = days.slice(0, MAX_DAYS);

    var tabs = document.getElementById('tabs');
    tabs.innerHTML = '';
    panels.innerHTML = '';

    if (!days.length) {
      panels.innerHTML = '<p class="error">Aucune donnée de veille disponible.</p>';
      return;
    }

    function cap(arr, lang) { return (arr || []).filter(function (it) { return langOf(it) === lang; }).slice(0, MAX_ITEMS).length; }

    days.forEach(function (day, i) {
      var id = 'jour-' + (day.date || i);
      var total = cap(day.articles, 'fr') + cap(day.articles, 'en') + cap(day.podcasts, 'fr') + cap(day.podcasts, 'en');

      var tab = document.createElement('button');
      tab.className = 'tab'; tab.setAttribute('role', 'tab'); tab.id = 'tab-' + id;
      tab.setAttribute('aria-controls', 'panel-' + id);
      tab.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
      tab.tabIndex = i === 0 ? 0 : -1;
      tab.innerHTML = esc(day.label || day.date) + '<span class="badge">' + total + '</span>';
      tabs.appendChild(tab);

      var panel = document.createElement('section');
      panel.className = 'panel' + (i === 0 ? ' active' : ''); panel.id = 'panel-' + id;
      panel.setAttribute('role', 'tabpanel'); panel.setAttribute('aria-labelledby', 'tab-' + id);
      panel.innerHTML =
        '<p class="panel-date">Veille du ' + esc(day.label || day.date) + '</p>' +
        sectionHTML('sec-articles', 'Articles', day.articles, 'Ouvrir') +
        sectionHTML('sec-podcasts', 'Podcasts', day.podcasts, 'Écouter');
      panels.appendChild(panel);

      tab.addEventListener('click', function () { select(id); });
    });

    tabs.addEventListener('keydown', function (e) {
      if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
      var l = Array.prototype.slice.call(tabs.querySelectorAll('.tab'));
      var cur = l.indexOf(document.activeElement);
      if (cur === -1) return;
      var next = e.key === 'ArrowRight' ? (cur + 1) % l.length : (cur - 1 + l.length) % l.length;
      l[next].focus(); l[next].click(); e.preventDefault();
    });

    updateView();
  }

  function select(id) {
    document.querySelectorAll('.tab').forEach(function (t) {
      var on = t.id === 'tab-' + id;
      t.setAttribute('aria-selected', on ? 'true' : 'false'); t.tabIndex = on ? 0 : -1;
    });
    document.querySelectorAll('.panel').forEach(function (p) { p.classList.toggle('active', p.id === 'panel-' + id); });
    updateView();
  }

  // Met à jour compteurs + états vides selon la langue active
  function updateView() {
    var lang = panels.getAttribute('data-lang') || 'fr';
    var active = panels.querySelector('.panel.active');
    if (!active) return;
    active.querySelectorAll('.sec').forEach(function (sec) {
      var visible = 0;
      sec.querySelectorAll('.post').forEach(function (p) {
        if (lang === 'all' || p.getAttribute('data-lang') === lang) visible++;
      });
      var c = sec.querySelector('.count');
      if (c) c.textContent = visible + ' item' + (visible > 1 ? 's' : '');
      var e = sec.querySelector('.empty');
      if (e) e.hidden = visible !== 0;
    });
  }

  (function () {
    panels = document.getElementById('panels');
    panels.setAttribute('data-filter', 'all');
    panels.setAttribute('data-lang', 'fr'); // défaut : francophone uniquement

    document.querySelectorAll('.seg-type').forEach(function (btn) {
      btn.addEventListener('click', function () {
        panels.setAttribute('data-filter', btn.getAttribute('data-filter'));
        document.querySelectorAll('.seg-type').forEach(function (b) { b.setAttribute('aria-pressed', b === btn ? 'true' : 'false'); });
        updateView();
      });
    });
    document.querySelectorAll('.seg-lang').forEach(function (btn) {
      btn.addEventListener('click', function () {
        panels.setAttribute('data-lang', btn.getAttribute('data-lang'));
        document.querySelectorAll('.seg-lang').forEach(function (b) { b.setAttribute('aria-pressed', b === btn ? 'true' : 'false'); });
        updateView();
      });
    });

    function openPost(el) { var href = el && el.getAttribute('data-href'); if (href) window.open(href, '_blank', 'noopener'); }
    panels.addEventListener('click', function (e) { var el = e.target.closest('.post.row-link'); if (el) openPost(el); });
    panels.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      var el = e.target.closest('.post.row-link'); if (el) { e.preventDefault(); openPost(el); }
    });
    panels.addEventListener('error', function (e) {
      var t = e.target;
      if (t && t.classList && t.classList.contains('post-thumb-img')) t.remove();
    }, true);
  })();

  fetch('data.json?_=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(function (err) {
      document.getElementById('panels').innerHTML =
        '<p class="error">Impossible de charger l\'historique (' + esc(err.message) + ').</p>';
    });
</script>
</body>
</html>
